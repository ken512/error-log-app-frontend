<!DOCTYPE html>
<html lang="ja">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラーログ解決アプリ</title>
    <link rel="stylesheet" href="css/new/style.css">
  </head>

  <body>
    <main>
      <header>
        <div class="debug">
          <a href="index.html" class="debug-left">
            <svg xmlns="http://www.w3.org/2000/svg" class="debug-icon" viewBox="0 0 16 16">
              <path
                d="M4.978.855a.5.5 0 1 0-.956.29l.41 1.352A5 5 0 0 0 3 6h10a5 5 0 0 0-1.432-3.503l.41-1.352a.5.5 0 1 0-.956-.29l-.291.956A5 5 0 0 0 8 1a5 5 0 0 0-2.731.811l-.29-.956z" />
              <path
                d="M13 6v1H8.5v8.975A5 5 0 0 0 13 11h.5a.5.5 0 0 1 .5.5v.5a.5.5 0 1 0 1 0v-.5a1.5 1.5 0 0 0-1.5-1.5H13V9h1.5a.5.5 0 0 0 0-1H13V7h.5A1.5 1.5 0 0 0 15 5.5V5a.5.5 0 0 0-1 0v.5a.5.5 0 0 1-.5.5zm-5.5 9.975V7H3V6h-.5a.5.5 0 0 1-.5-.5V5a.5.5 0 0 0-1 0v.5A1.5 1.5 0 0 0 2.5 7H3v1H1.5a.5.5 0 0 0 0 1H3v1h-.5A1.5 1.5 0 0 0 1 11.5v.5a.5.5 0 1 0 1 0v-.5a.5.5 0 0 1 .5-.5H3a5 5 0 0 0 4.5 4.975" />
            </svg>
            <div class="debug-text">error_log</div>
          </a>
          <div class="certification">
            <button class="signup-button"><a href="signup.html">新規登録</a></button>
            <button class="login-button"><a href="login.html">ログイン</a></button>
          </div>
        </div>
      </header>

      <div class="content-container">
        <h1 class="page-title">ログを編集</h1>

        <form class="log-form">
          <section class="form-section">
            <h2>基本情報</h2>

            <div class="form-group">
              <label for="title">タイトル <span class="required">*</span></label>
              <input type="text" id="title" name="title" placeholder="例: TypeError: map is not a function" required>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="category">カテゴリ</label>
                <select id="category" name="category">
                  <option value="">選択してください</option>
                  <option value="react">React</option>
                  <option value="vue">Vue</option>
                  <option value="angular">Angular</option>
                  <option value="nodejs">Node.js</option>
                  <option value="other">その他</option>
                </select>
              </div>

              <div class="form-group">
                <label>解決済み</label>
                <div class="status-buttons">
                  <button type="button" class="status-btn resolved">解決済み</button>
                  <button type="button" class="status-btn">未解決</button>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label for="tags">技術タグ</label>
              <div class="tags-input">
                <span class="tag">TypeScript <button type="button" class="tag-remove">×</button></span>
                <span class="tag">Docker <button type="button" class="tag-remove">×</button></span>
                <input type="text" id="tags" placeholder="タグを追加...">
              </div>
            </div>
          </section>

          <section class="form-section">
            <h2>発生環境</h2>

            <div class="form-row">
              <div class="form-group">
                <label for="os">OS</label>
                <input type="text" id="os" name="os" placeholder="OS (Mac)">
              </div>

              <div class="form-group">
                <label for="node">Node</label>
                <input type="text" id="node" name="node" placeholder="Node (v22)">
              </div>

              <div class="form-group">
                <label for="framework">フレームワーク</label>
                <input type="text" id="framework" name="framework" placeholder="Next.js (v15)">
              </div>
            </div>
          </section>

          <section class="form-section">
            <h2>エラー詳細</h2>

            <div class="form-group">
              <label for="error-message">エラーメッセージ</label>
              <textarea id="error-message" name="error-message" placeholder="TypeError: ..." rows="6"></textarea>
            </div>

            <div class="form-group">
              <label for="cause">原因</label>
              <textarea id="cause" name="cause" placeholder="何が悪かったか" rows="6"></textarea>
            </div>

            <div class="form-group">
              <label for="solution">解決方法</label>
              <textarea id="solution" name="solution" placeholder="最終的にどう対応したか" rows="6"></textarea>
            </div>

            <div class="form-group">
              <label for="reference-url">参考URL</label>
              <input type="url" id="reference-url" name="reference-url" placeholder="https://qiita.com/...">
            </div>
          </section>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="window.location.href='log-detail.html'">キャンセル</button>
            <button type="submit" class="btn btn-primary">保存する</button>
          </div>
        </form>
      </div>
    </main>

    <footer>
      <p>
        error_log
        © 2026</p>
    </footer>
  </body>

</html>
